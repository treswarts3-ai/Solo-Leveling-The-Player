ingEnabled=false;for(let y=0;y<16;y++)for(let i=0;i<16;i++)if(px[y][i]){x.fillStyle=px[y][i];x.fillRect(i,y,1,1)}document.getElementById('save').onclick=()=>{const a=document.createElement('a');a.download='dungeon_key.png';a.href=c.toDataURL('image/png');a.click()};</script></body></html>
