name: Apply System UI PR Batch

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/apply-system-ui-pr.yml'

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feature/system-ui'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout worker branch
        uses: actions/checkout@v4
        with:
          ref: feature/system-ui
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Restore pending UI sources
        shell: python
        run: |
          import base64
          import io
          import pathlib
          import re
          import shutil
          import tarfile

          workflow = pathlib.Path('.github/workflows/apply-system-ui-batch.yml').read_text(encoding='utf-8')
          match = re.search(r'payload = "([A-Za-z0-9+/=]+)"', workflow)
          if match is None:
              raise RuntimeError('Pending System UI payload was not found')
          archive = base64.b64decode(match.group(1))
          temp = pathlib.Path('/tmp/system-ui-batch')
          temp.mkdir(parents=True, exist_ok=True)
          with tarfile.open(fileobj=io.BytesIO(archive), mode='r:gz') as bundle:
              bundle.extractall(temp)
          targets = {
              'SystemScreen.java': pathlib.Path('src/main/java/com/tre/sololeveling/client/screen/SystemScreen.java'),
              'ClientEvents.java': pathlib.Path('src/main/java/com/tre/sololeveling/client/ClientEvents.java'),
          }
          for source, target in targets.items():
              shutil.copyfile(temp / source, target)

      - name: Build Forge project
        id: build
        shell: bash
        run: |
          set +e
          chmod +x gradlew
          ./gradlew clean build --stacktrace --no-daemon 2>&1 | tee /tmp/system-ui-build.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Prepare compiler diagnostics
        if: steps.build.outputs.status != '0'
        shell: bash
        run: |
          {
            echo "System UI Gradle failure summary"
            echo "================================"
            grep -nE 'error:|FAILURE:|What went wrong|symbol:|location:|BUILD FAILED' /tmp/system-ui-build.log || true
            echo
            echo "Last 220 build lines"
            echo "===================="
            tail -n 220 /tmp/system-ui-build.log
          } > SYSTEM_UI_BUILD_FAILURE.log

      - name: Upload compiler diagnostics
        if: steps.build.outputs.status != '0'
        uses: actions/upload-artifact@v4
        with:
          name: system-ui-build-failure
          path: SYSTEM_UI_BUILD_FAILURE.log
          retention-days: 3

      - name: Commit validated UI batch
        if: steps.build.outputs.status == '0'
        shell: bash
        run: |
          rm -f SYSTEM_UI_BUILD_FAILURE.log
          rm -f .github/workflows/apply-system-ui-batch.yml .github/workflows/apply-system-ui-pr.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Complete responsive System HUD and menus"
          git pull --rebase origin feature/system-ui
          git push origin HEAD:feature/system-ui

      - name: Fail invalid UI batch
        if: steps.build.outputs.status != '0'
        shell: bash
        run: exit 1
