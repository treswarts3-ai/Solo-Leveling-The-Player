name: Apply progression UI patch

on:
  push:
    branches:
      - feature/creative-progression
    paths:
      - '.github/workflows/apply-progression-ui.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/creative-progression
          fetch-depth: 0

      - name: Patch System quest UI
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/main/java/com/tre/sololeveling/client/screen/SystemScreen.java')
          text = path.read_text(encoding='utf-8')

          start = text.index('    private void addQuestButtons() {')
          end = text.index('    private void addStoreButtons()', start)
          replacement = '''    private void addQuestButtons() {
              int y = contentY + contentHeight - 20;
              Button claim = Button.builder(Component.literal("CLAIM DAILY REWARD"), ignored -> send("CLAIM_DAILY"))
                      .bounds(contentX, y, Math.min(150, contentWidth), 18).build();
              actionButtons.put("claim_daily", claim);
              addRenderableWidget(claim);
          }

          '''
          text = text[:start] + replacement + text[end:]

          replacements = {
              'DAILY — PREPARATION TO BECOME POWERFUL': 'DAILY — ADAPTIVE HUNTER TRAINING',
              'objective(graphics, y, "Hostile mobs", data.raw().getInt("daily_kills"), 10);': 'objective(graphics, y, "Defeat enemies", data.raw().getInt("daily_kills"), 8);',
              'objective(graphics, y, "Run blocks", data.raw().getInt("daily_run"), 1000);': 'objective(graphics, y, "Sprint distance", data.raw().getInt("daily_run"), 600);',
              'objective(graphics, y, "Push-ups", data.raw().getInt("daily_pushups"), 30);': 'objective(graphics, y, "Land attacks", data.raw().getInt("daily_attacks"), 20);',
              'objective(graphics, y, "Sit-ups", data.raw().getInt("daily_situps"), 30);': 'objective(graphics, y, "Jump and traverse", data.raw().getInt("daily_jumps"), 15);',
              'objective(graphics, y, "Squats", data.raw().getInt("daily_squats"), 30);': 'objective(graphics, y, "Use abilities", data.raw().getInt("daily_abilities"), 5);',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'Expected UI text not found: {old}')
              text = text.replace(old, new, 1)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit patch and remove one-use workflow
        shell: bash
        run: |
          rm .github/workflows/apply-progression-ui.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/main/java/com/tre/sololeveling/client/screen/SystemScreen.java .github/workflows/apply-progression-ui.yml
          git commit -m 'Replace exercise buttons with adaptive training UI'
          git push origin HEAD:feature/creative-progression
