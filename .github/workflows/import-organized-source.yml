name: Import Organized Source

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  import-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout migration branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Detect migration state
        id: state
        shell: bash
        run: |
          if [ -d .migration ]; then
            echo 'pending=true' >> "$GITHUB_OUTPUT"
          else
            echo 'pending=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.8
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.8'

      - name: Reconstruct verified source archive
        if: steps.state.outputs.pending == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cat \
            .migration/chunk00.b64 \
            .migration/chunk01.b64 \
            .migration/chunk02.b64 \
            .migration/chunk03.b64 \
            .migration/chunk04.b64 \
            .migration/chunk05.b64 \
            .migration/chunk06a.b64 \
            .migration/chunk06b.b64 \
            | tr -d '\n\r' | base64 --decode > /tmp/solo-migration-min.tar.gz
          echo '95c469f9eeae7da50d8f54d0975f76f205257f8872c20e4e0188069e6e6faa44  /tmp/solo-migration-min.tar.gz' | sha256sum --check --strict
          mkdir -p /tmp/solo-source
          tar -xzf /tmp/solo-migration-min.tar.gz -C /tmp/solo-source
          test -f /tmp/solo-source/solo-migration-min/build.gradle
          test -f /tmp/solo-source/solo-migration-min/src/main/java/com/tre/sololeveling/SoloLevelingMod.java

      - name: Install organized project tree
        if: steps.state.outputs.pending == 'true'
        shell: bash
        run: |
          set -euo pipefail
          rsync -a --exclude='.github/' /tmp/solo-source/solo-migration-min/ ./
          rm -rf .migration

      - name: Regenerate project assets
        if: steps.state.outputs.pending == 'true'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python3 -m pip install --disable-pip-version-check pillow
          python3 tools/generate_assets.py
          if [ -f ASSET_MANIFEST.md ]; then
            mkdir -p docs
            mv ASSET_MANIFEST.md docs/ASSET_MANIFEST.md
          fi

      - name: Restore Gradle wrapper
        if: steps.state.outputs.pending == 'true'
        shell: bash
        run: |
          set -euo pipefail
          gradle wrapper --gradle-version 8.8
          chmod +x gradlew
          test -f gradle/wrapper/gradle-wrapper.jar

      - name: Build and verify Forge mod
        shell: bash
        run: |
          chmod +x gradlew
          ./gradlew clean build --stacktrace --no-daemon

      - name: Commit verified organized source to migration branch
        if: steps.state.outputs.pending == 'true'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf build .gradle run out
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Import verified organized Solo Leveling source'
          git push origin "HEAD:${GITHUB_HEAD_REF}"
