name: Import Organized Source

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  diagnose-archive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout migration branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Diagnose staged archive
        shell: bash
        run: |
          set +e
          cat .migration/chunk*.b64 | tr -d '\n\r' | base64 --decode > /tmp/solo-migration-min.tar.gz
          decode_status=$?
          actual_sha=$(sha256sum /tmp/solo-migration-min.tar.gz | awk '{print $1}')
          actual_size=$(wc -c < /tmp/solo-migration-min.tar.gz)
          tar -tzf /tmp/solo-migration-min.tar.gz > /tmp/tar-list.txt 2> /tmp/tar-error.txt
          tar_status=$?
          {
            echo "decode_status=${decode_status}"
            echo "actual_sha=${actual_sha}"
            echo "expected_sha=95c469f9eeae7da50d8f54d0975f76f205257f8872c20e4e0188069e6e6faa44"
            echo "actual_size=${actual_size}"
            echo "tar_status=${tar_status}"
            echo "tar_error=$(tr '\n' ' ' < /tmp/tar-error.txt)"
            echo "first_entry=$(head -n 1 /tmp/tar-list.txt)"
          } > .migration/diagnostic.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .migration/diagnostic.txt
          git commit -m 'Record migration archive diagnostics'
          git push origin "HEAD:${GITHUB_HEAD_REF}"
