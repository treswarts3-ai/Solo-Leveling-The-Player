name: Import Organized Source

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/import-organized-source.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.8
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.8'

      - name: Reconstruct verified source archive
        shell: bash
        run: |
          set -euo pipefail
          cat .migration/chunk*.b64 | tr -d '\n\r' | base64 --decode > /tmp/solo-migration-min.tar.gz
          echo '95c469f9eeae7da50d8f54d0975f76f205257f8872c20e4e0188069e6e6faa44  /tmp/solo-migration-min.tar.gz' | sha256sum --check --strict
          mkdir -p /tmp/solo-source
          tar -xzf /tmp/solo-migration-min.tar.gz -C /tmp/solo-source
          test -f /tmp/solo-source/solo-migration-min/build.gradle
          test -f /tmp/solo-source/solo-migration-min/src/main/java/com/tre/sololeveling/SoloLevelingMod.java

      - name: Install organized project tree
        shell: bash
        run: |
          set -euo pipefail
          rsync -a /tmp/solo-source/solo-migration-min/ ./
          rm -rf .migration
          rm -f .github/workflows/import-organized-source.yml

      - name: Regenerate project assets
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check pillow
          python tools/generate_assets.py
          if [ -f ASSET_MANIFEST.md ]; then
            mkdir -p docs
            mv ASSET_MANIFEST.md docs/ASSET_MANIFEST.md
          fi

      - name: Restore Gradle wrapper
        shell: bash
        run: |
          set -euo pipefail
          gradle wrapper --gradle-version 8.8
          chmod +x gradlew
          test -f gradle/wrapper/gradle-wrapper.jar

      - name: Build and verify Forge mod
        shell: bash
        run: ./gradlew clean build --stacktrace --no-daemon

      - name: Commit verified organized source
        shell: bash
        run: |
          set -euo pipefail
          rm -rf build .gradle run out
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Import verified organized Solo Leveling source'
          git push origin main
