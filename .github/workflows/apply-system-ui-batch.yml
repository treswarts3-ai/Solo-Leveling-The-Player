name: Apply System UI Batch

on:
  push:
    branches:
      - feature/system-ui
    paths:
      - '.github/workflows/apply-system-ui-batch.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout worker branch
        uses: actions/checkout@v4
        with:
          ref: feature/system-ui
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Restore UI source batch
        shell: python
        run: |
          import base64
          import io
          import pathlib
          import shutil
          import tarfile

          payload = ""
          archive = base64.b64decode(payload)
          temp = pathlib.Path('/tmp/system-ui-batch')
          temp.mkdir(parents=True, exist_ok=True)
          with tarfile.open(fileobj=io.BytesIO(archive), mode='r:gz') as bundle:
              bundle.extractall(temp)
          targets = {
              'SystemScreen.java': pathlib.Path('src/main/java/com/tre/sololeveling/client/screen/SystemScreen.java'),
              'ClientEvents.java': pathlib.Path('src/main/java/com/tre/sololeveling/client/ClientEvents.java'),
          }
          for source, target in targets.items():
              target.parent.mkdir(parents=True, exist_ok=True)
              shutil.copyfile(temp / source, target)

      - name: Build Forge project
        id: build
        shell: bash
        run: |
          set +e
          chmod +x gradlew
          ./gradlew clean build --stacktrace --no-daemon 2>&1 | tee /tmp/system-ui-build.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Record build failure
        if: steps.build.outputs.status != '0'
        shell: bash
        run: |
          cp /tmp/system-ui-build.log SYSTEM_UI_BUILD_FAILURE.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add SYSTEM_UI_BUILD_FAILURE.log
          git commit -m "Record System UI build failure" || true
          git push origin HEAD:feature/system-ui
          exit 1

      - name: Commit validated UI batch
        if: steps.build.outputs.status == '0'
        shell: bash
        run: |
          rm -f SYSTEM_UI_BUILD_FAILURE.log .github/workflows/apply-system-ui-batch.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Complete responsive System HUD and menus"
          git push origin HEAD:feature/system-ui
