name: Forge Build

on:
  push:
    branches:
      - main
      - integration
      - 'feature/**'
      - 'fix/**'
  pull_request:
    branches:
      - main
      - integration

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Validate master dungeon design
        shell: bash
        run: |
          set -euo pipefail
          python tools/generate_dungeon_structures.py --manifest /tmp/master-dungeon-metrics.json
          test ! -e src/main/resources/data/sololeveling/structures/dungeons/abandoned_subway.nbt
          test ! -e src/main/resources/data/sololeveling/structures/dungeons/red_orc_outpost.nbt
          test ! -e src/main/resources/data/sololeveling/structures/dungeons/demon_castle_foyer.nbt
          test ! -e src/main/resources/data/sololeveling/structures/dungeons/cartenon_temple.nbt
          ! grep -R -n -E 'abandoned_subway|red_orc_outpost|demon_castle_foyer|cartenon_temple' \
            src/main/java/com/tre/sololeveling/dungeon src/main/java/com/tre/sololeveling/client/screen/SystemScreen.java docs/COMMANDS.md docs/DUNGEONS.md
          grep -q 'MAX_BLOCK_VISITS_PER_TICK = 16_384' src/main/java/com/tre/sololeveling/dungeon/MasterDungeonBuilder.java
          grep -q 'MAX_BLOCK_CHANGES_PER_TICK = 4_096' src/main/java/com/tre/sololeveling/dungeon/MasterDungeonBuilder.java
          grep -q 'SessionState { BUILDING, WAITING' src/main/java/com/tre/sololeveling/dungeon/DungeonTypes.java
          grep -q 'DungeonArena.tickJobs(server)' src/main/java/com/tre/sololeveling/dungeon/DungeonRuntime.java
          ! grep -R -n 'MasterDungeonBuilder\.build(' src/main/java/com/tre/sololeveling/dungeon

      - name: Validate System UI assets
        shell: bash
        run: python tools/validate_ui_assets.py

      - name: Build Forge mod
        shell: bash
        run: |
          set -o pipefail
          chmod +x gradlew
          ./gradlew clean build --stacktrace --no-daemon 2>&1 | tee build.log

      - name: Upload build outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: solo-leveling-build
          if-no-files-found: warn
          retention-days: 14
          path: |
            build.log
            build/libs/*.jar
            build/reports/**
