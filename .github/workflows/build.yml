name: Apply Bounded Dungeon Generation

on:
  push:
    branches:
      - feature/master-dungeon-rebuild
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/master-dungeon-rebuild
          fetch-depth: 1
          show-progress: false

      - name: Apply bounded generation payload
        shell: bash
        run: python tools/apply_perf_patch.py

      - name: Commit bounded generation patch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No generated changes"
            exit 0
          fi
          git commit -m "Stage master dungeon generation across server ticks"
          git push origin HEAD:feature/master-dungeon-rebuild
