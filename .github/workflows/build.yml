name: Forge Build

on:
  push:
    branches:
      - main
      - integration
      - 'feature/**'
      - 'fix/**'
  pull_request:
    branches:
      - main
      - integration

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Build Forge mod
        shell: bash
        run: |
          set -o pipefail
          chmod +x gradlew
          ./gradlew clean build --stacktrace --no-daemon 2>&1 | tee build.log

      - name: Capture source snapshot
        if: always()
        shell: bash
        run: zip -qr source-snapshot.zip . -x '.git/*' '.gradle/*' 'build/*' 'source-snapshot.zip'

      - name: Upload build outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: solo-leveling-build
          if-no-files-found: warn
          retention-days: 14
          path: |
            source-snapshot.zip
            build.log
            build/libs/*.jar
            build/reports/**
