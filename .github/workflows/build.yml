name: Apply Master Dungeon Rebuild

on:
  push:
    branches:
      - feature/master-dungeon-rebuild

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply complete rebuild payload
        shell: bash
        run: python tools/apply_master_dungeon_patch.py

      - name: Commit master dungeon rebuild
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No generated changes"
            exit 0
          fi
          git commit -m "Build the Abyssal Necropolis master dungeon"
          git push origin HEAD:${GITHUB_REF_NAME}
