name: Snapshot Master Dungeon Branch

on:
  push:
    branches:
      - feature/master-dungeon-rebuild
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/master-dungeon-rebuild
          fetch-depth: 1
          show-progress: false

      - name: Upload readable source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: master-dungeon-branch-source
          retention-days: 2
          path: |
            src/**
            docs/**
            tools/**
            .github/workflows/build.yml
