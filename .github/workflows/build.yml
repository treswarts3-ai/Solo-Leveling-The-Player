name: Forge Build

on:
  push:
    branches:
      - main
      - integration
      - 'feature/**'
      - 'fix/**'
  pull_request:
    branches:
      - main
      - integration

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}

      - name: Apply reviewed UI overhaul payload
        if: (github.event_name == 'push' && github.ref == 'refs/heads/feature/ui-overhaul') || (github.event_name == 'pull_request' && github.head_ref == 'feature/ui-overhaul')
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "solo-leveling-ui-worker"
          git config user.email "ui-worker@users.noreply.github.com"
          python tools/apply_ui_overhaul.py
          git checkout HEAD -- .github/workflows/build.yml .github/workflows/apply-ui-overhaul.yml
          git rm -r tools/ui_patch tools/apply_ui_overhaul.py
          git add -A
          git diff --cached --check
          git commit -m "Overhaul System UI and HUD"
          git push origin HEAD:feature/ui-overhaul

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate Gradle wrapper
        uses: actions/wrapper-validation@v4

      - name: Validate authored dungeon structures
        shell: bash
        run: |
          set -euo pipefail
          python tools/generate_dungeon_structures.py --output /tmp/solo-leveling-dungeons
          for file in src/main/resources/data/sololeveling/structures/dungeons/*.nbt; do
            cmp "$file" "/tmp/solo-leveling-dungeons/${file##*/}"
          done

      - name: Validate System UI assets
        shell: bash
        run: python tools/validate_ui_assets.py

      - name: Build Forge mod
        shell: bash
        run: |
          set -o pipefail
          chmod +x gradlew
          ./gradlew clean build --stacktrace --no-daemon 2>&1 | tee build.log

      - name: Upload build outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: solo-leveling-build
          if-no-files-found: warn
          retention-days: 14
          path: |
            build.log
            build/libs/*.jar
            build/reports/**
