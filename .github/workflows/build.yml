name: Forge Build

on:
  push:
    branches:
      - main
      - integration
      - 'feature/**'
      - 'fix/**'
  pull_request:
    branches:
      - main
      - integration

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Validate authored dungeon structures
        shell: bash
        run: |
          set -euo pipefail
          python tools/generate_dungeon_structures.py --output /tmp/solo-leveling-dungeons
          for file in src/main/resources/data/sololeveling/structures/dungeons/*.nbt; do
            cmp "$file" "/tmp/solo-leveling-dungeons/${file##*/}"
          done

      - name: Build Forge mod
        shell: bash
        run: |
          set -o pipefail
          chmod +x gradlew
          ./gradlew clean build --stacktrace --no-daemon 2>&1 | tee build.log

      - name: Upload build outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: solo-leveling-build
          if-no-files-found: warn
          retention-days: 14
          path: |
            build.log
            build/libs/*.jar
            build/reports/**
