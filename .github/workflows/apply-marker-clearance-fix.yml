name: Apply Dungeon Marker Clearance Fix

on:
  push:
    branches:
      - fix/master-dungeon-marker-clearance

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fix branch
        uses: actions/checkout@v4
        with:
          ref: fix/master-dungeon-marker-clearance
          fetch-depth: 0

      - name: Patch marker clearance and regression check
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          source = Path('src/main/java/com/tre/sololeveling/dungeon/MasterDungeonBuilder.java')
          text = source.read_text(encoding='utf-8')
          old = '''    private static void decorate(Editor e) {
              decorateEntry(e);
              decorateBridge(e);
              decorateOssuary(e);
              decorateFoundry(e);
              decorateKingdom(e);
              decorateCatacombs(e);
              decorateFinale(e);
          }
          '''
          new = '''    private static void decorate(Editor e) {
              decorateEntry(e);
              decorateBridge(e);
              decorateOssuary(e);
              decorateFoundry(e);
              decorateKingdom(e);
              decorateCatacombs(e);
              decorateFinale(e);
              ensureObjectiveClearance(e);
          }

          /**
           * Runs after every decorative pass so teleport, encounter, boss, and reward
           * markers cannot be occupied by statues, rubble, altars, or other solid detail.
           */
          private static void ensureObjectiveClearance(Editor e) {
              for (BlockPos marker : OBJECTIVE_CENTERS) {
                  e.fill(marker.getX() - 1, marker.getX() + 1,
                          marker.getY(), marker.getY() + 2,
                          marker.getZ() - 1, marker.getZ() + 1, AIR);
              }
          }
          '''
          if old in text:
              source.write_text(text.replace(old, new, 1), encoding='utf-8')
          elif 'ensureObjectiveClearance(e);' not in text:
              raise SystemExit('Expected decorate method was not found')

          workflow = Path('.github/workflows/build.yml')
          build = workflow.read_text(encoding='utf-8')
          anchor = "          grep -q 'MAX_BLOCK_CHANGES_PER_TICK = 4_096' src/main/java/com/tre/sololeveling/dungeon/MasterDungeonBuilder.java\n"
          check = "          grep -q 'ensureObjectiveClearance(e);' src/main/java/com/tre/sololeveling/dungeon/MasterDungeonBuilder.java\n"
          if check not in build:
              if anchor not in build:
                  raise SystemExit('Expected build validation anchor was not found')
              workflow.write_text(build.replace(anchor, anchor + check, 1), encoding='utf-8')

          Path('.github/workflows/apply-marker-clearance-fix.yml').unlink()
          PY

      - name: Commit patched source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/main/java/com/tre/sololeveling/dungeon/MasterDungeonBuilder.java .github/workflows/build.yml .github/workflows/apply-marker-clearance-fix.yml
          git commit -m "Fix blocked master dungeon objective markers"
          git push origin HEAD:fix/master-dungeon-marker-clearance
