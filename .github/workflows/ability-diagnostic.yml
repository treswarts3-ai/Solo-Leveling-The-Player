name: Ability Diagnostic Build

on:
  push:
    branches:
      - feature/abilities
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  compile:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - uses: gradle/actions/setup-gradle@v4
      - name: Compile and capture diagnostics
        shell: bash
        run: |
          set -o pipefail
          chmod +x gradlew
          ./gradlew clean compileJava --stacktrace --no-daemon 2>&1 | tee ability-compile.log
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ability-compile-diagnostics
          path: ability-compile.log
          retention-days: 1
