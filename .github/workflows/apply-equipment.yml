name: Apply Equipment Worker

on:
  push:
    branches:
      - feature/equipment
    paths:
      - tools/apply_equipment_patch.py
      - .github/workflows/apply-equipment.yml

permissions:
  contents: write

concurrency:
  group: apply-equipment-worker
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout equipment branch
        uses: actions/checkout@v4
        with:
          ref: feature/equipment
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install asset dependencies
        shell: bash
        run: |
          python -m pip install --disable-pip-version-check pillow
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg

      - name: Configure worker commits
        shell: bash
        run: |
          git config user.name "solo-leveling-equipment-worker"
          git config user.email "equipment-worker@users.noreply.github.com"
          chmod +x gradlew

      - name: Equipment framework group
        shell: bash
        run: |
          python tools/apply_equipment_patch.py framework
          ./gradlew clean build --stacktrace --no-daemon
          git add src/main/java/com/tre/sololeveling/equipment src/main/java/com/tre/sololeveling/item/HunterAccessoryItem.java src/main/java/com/tre/sololeveling/item/EquipmentUpgradeMaterialItem.java src/main/java/com/tre/sololeveling/item/ItemAcquisitionCatalog.java
          git diff --cached --quiet || git commit -m "Add reusable equipment framework"

      - name: Item groups and creative organization
        shell: bash
        run: |
          python tools/apply_equipment_patch.py items
          ./gradlew clean build --stacktrace --no-daemon
          git add src/main/java/com/tre/sololeveling/SoloLevelingMod.java src/main/java/com/tre/sololeveling/item/HunterWeaponItem.java src/main/java/com/tre/sololeveling/item/HunterArmorItem.java src/main/java/com/tre/sololeveling/item/FunctionalItem.java src/main/java/com/tre/sololeveling/registry/ModItems.java
          git diff --cached --quiet || git commit -m "Add equipment item groups and upgrades"

      - name: Assets recipes and loot group
        shell: bash
        run: |
          python tools/apply_equipment_patch.py assets
          sed -i "s/(?:weapon|story|accessory|rune|add)/(?:weapon|armor|story|accessory|rune|material|consumable)/" tools/generate_assets.py
          python tools/generate_assets.py
          python tools/finalize_equipment_assets.py
          python tools/validate_equipment_assets.py
          ./gradlew clean build --stacktrace --no-daemon
          git add tools/generate_assets.py tools/finalize_equipment_assets.py tools/validate_equipment_assets.py ASSET_MANIFEST.md EQUIPMENT_ACQUISITION.json src/main/resources tools/pixel_art
          git diff --cached --quiet || git commit -m "Generate equipment assets recipes and loot"

      - name: Push stable equipment commits
        shell: bash
        run: git push origin HEAD:feature/equipment
