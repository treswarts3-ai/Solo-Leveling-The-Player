name: Fix dungeon compile call

on:
  push:
    branches:
      - fix/playtest-round-1
    paths:
      - '.github/workflows/fix-dungeon-compile.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/playtest-round-1
          fetch-depth: 0

      - name: Apply exact compile fix
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/main/java/com/tre/sololeveling/dungeon/DungeonArena.java')
          text = path.read_text(encoding='utf-8')
          old = 'fill(level, origin, x - 1, x + 1, 2, 2, 0, Blocks.CUT_COPPER.defaultBlockState());'
          new = 'fill(level, origin, x - 1, x + 1, 2, 2, 0, 0, Blocks.CUT_COPPER.defaultBlockState());'
          if old not in text:
              raise SystemExit('Expected compile-error line not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Commit fix and remove one-use workflow
        shell: bash
        run: |
          rm .github/workflows/fix-dungeon-compile.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/main/java/com/tre/sololeveling/dungeon/DungeonArena.java .github/workflows/fix-dungeon-compile.yml
          git commit -m 'Fix subway copper detail fill range'
          git push origin HEAD:fix/playtest-round-1
