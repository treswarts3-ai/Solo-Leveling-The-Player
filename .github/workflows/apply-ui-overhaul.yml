name: Apply UI Overhaul

on:
  push:
    branches:
      - feature/ui-overhaul
    paths:
      - tools/apply_ui_overhaul.py
      - tools/ui_patch/**
      - .github/workflows/apply-ui-overhaul.yml

permissions:
  contents: write

concurrency:
  group: apply-ui-overhaul
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/ui-overhaul
          fetch-depth: 0
      - name: Configure commit identity
        shell: bash
        run: |
          git config user.name "solo-leveling-ui-worker"
          git config user.email "ui-worker@users.noreply.github.com"
      - name: Apply reviewed UI overhaul
        shell: bash
        run: |
          set -euo pipefail
          python tools/apply_ui_overhaul.py
          git rm -r tools/ui_patch tools/apply_ui_overhaul.py .github/workflows/apply-ui-overhaul.yml
          git add -A
          git diff --cached --check
          git commit -m "Overhaul System UI and HUD"
          git push origin HEAD:feature/ui-overhaul
