name: Bug report
description: Report a reproducible gameplay, build, networking, or resource problem.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      placeholder: "1. ...\n2. ...\n3. ..."
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Commit or build version
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Single-player
        - Integrated multiplayer
        - Dedicated server
        - Build or CI
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or crash report
      render: shell
